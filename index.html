<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MindAR — mismo modelo en todos los marcadores</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

  <div class="mensaje">
    Escanea cualquier imagen del set <code>targets.mind</code> para ver el modelo 3D
  </div>

  <!--
    data-image-target-count = número de imágenes con las que generaste targets.mind
    (debe coincidir con el compilador MindAR). Ajusta si añades o quitas marcadores.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets/targets.mind; autoStart: true; maxTrack: 8;"
    data-image-target-count="4"
    color-space="sRGB"
    renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <a-assets>
      <a-asset-item id="ar-example-model" src="./assets/example.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Los <a-entity mindar-image-target> se crean en app.js (mismo GLB para todos) -->

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
