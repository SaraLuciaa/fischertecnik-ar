<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR — imagen + modelo</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!--
      MindAR coloca el origen local en el centro de la imagen compilada en .mind
      (1 unidad ≈ ancho del marcador). Ajusta scale/position del modelo según tu GLB.
    -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets/targets.mind; maxTrack: 8;"
      color-space="sRGB"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="avatarModel" src="./assets/example.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.6" position="1 2 1"></a-light>

      <!-- targetIndex = orden en targets.mind; quita sobrantes si compilaste menos imágenes -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity position="0 0 0.12" scale="0.2 0.2 0.2">
          <a-gltf-model
            src="#avatarModel"
            position="0 0 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
          ></a-gltf-model>
        </a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-entity position="0 0 0.12" scale="0.2 0.2 0.2">
          <a-gltf-model
            src="#avatarModel"
            position="0 0 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
          ></a-gltf-model>
        </a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-entity position="0 0 0.12" scale="0.2 0.2 0.2">
          <a-gltf-model
            src="#avatarModel"
            position="0 0 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
          ></a-gltf-model>
        </a-entity>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-entity position="0 0 0.12" scale="0.2 0.2 0.2">
          <a-gltf-model
            src="#avatarModel"
            position="0 0 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
          ></a-gltf-model>
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
